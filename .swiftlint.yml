# SwiftLint configuration for iAPS (first-party code only)
# All rules are warn-only — no errors. This is the post-triage config.
# See SWIFTLINT_TRIAGE.md for full rule-by-rule decisions.
# Submodule paths mirror the exclude list in .swiftformat.

disabled_rules:
  - trailing_whitespace
  - identifier_name
  - empty_count
  - colon
  # Rules that produce errors on the existing baseline — disabled until addressed
  - large_tuple          # >2-member tuples are common in this codebase
  - shorthand_operator   # legacy style throughout
  - force_try            # intentional in medical-device networking/parsing code
  - force_cast           # same rationale
  - type_name            # existing naming conventions pre-date this rule

excluded:
  - LoopKit
  - OmniKit
  - OmniBLE
  - CGMBLEKit
  - MinimedKit
  - LibreTransmitter
  - G7SensorKit
  - dexcom-share-client-swift
  - DanaKit
  - TidepoolService
  - RileyLinkKit
  - NightscoutRemoteCGM
  - MedtrumKit
  - BuildTools

line_length:
  warning: 230
  error: 1100
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 300
  error: 500

function_parameter_count:
  warning: 6
  error: 15

type_body_length:
  warning: 300
  error: 1500

file_length:
  warning: 1000
  error: 2000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 150

reporter: "xcode"

# ── Tolerated warnings (tracked, not disabled) ────────────────────────────────
# These remain enabled as warnings to signal future refactor opportunities.
# Do not disable without updating SWIFTLINT_TRIAGE.md.
#
# line_length (49)                 — thresholds already relaxed to 230; remaining
#                                    lines are in medical algorithm code
# type_body_length (31)            — complex state models; splitting is risky
# todo (23)                        — upstream integration TODOs; worth tracking
# function_parameter_count (13)   — medical calculations need many typed params
# closure_parameter_position (12) — auto-fix can't resolve multi-closure DSL patterns
# cyclomatic_complexity (11)       — thresholds already relaxed; medical decision logic
# for_where (7)                   — structural refactor in APS code; risk > reward
# nesting (7)                     — SwiftUI DSL requires nesting
# file_length (5)                 — structural; splitting requires architectural review
# multiple_closures_with_trailing_closure (3) — SwiftUI idiom
# unused_optional_binding (3)     — needs case-by-case review
# legacy_random (3)               — in Dependencies/ example code; third-party
# function_body_length (2)        — medical algorithms; thresholds already relaxed
# computed_accessors_order (1)    — isolated; low priority
# void_function_in_ternary (1)    — isolated; low priority
# static_over_final_class (1)     — architectural decision; needs review
