
name: 5. Sync Upstream
run-name: Sync Upstream (${{ github.ref_name }})

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  UPSTREAM_URL: "https://github.com/Artificial-Pancreas/iAPS.git"
  TARGET_BRANCH: "main"

jobs:
  sync:
    name: Sync main from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream branch
        run: |
          git remote add upstream "${{ env.UPSTREAM_URL }}"
          git fetch upstream "${{ env.TARGET_BRANCH }}"

      - name: Fast-forward merge upstream
        run: git merge --ff-only "upstream/${{ env.TARGET_BRANCH }}"

      - name: Push synced branch
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/${{ env.TARGET_BRANCH }})" ]; then
            echo "No updates to push"
            exit 0
          fi
          git push origin "HEAD:${{ env.TARGET_BRANCH }}"
